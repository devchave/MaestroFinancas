# nginx config para o container de documentação (porta 80 interna)
# O nginx da VPS faz proxy deste container via porta 8001 (docker-compose.docs.yml)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_types text/html text/css application/javascript application/json
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Cache para assets com hash no nome (mkdocs gera hashes)
    location ~* \.(css|js|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check simples para o Docker HEALTHCHECK e o deploy.sh
    location = /health {
        access_log off;
        return 200 '{"ok":true}';
        add_header Content-Type application/json;
    }

    # SPA-style: página não encontrada → index (mkdocs usa isso para 404)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Sem expor .git ou arquivos ocultos
    location ~ /\. { deny all; }
}
