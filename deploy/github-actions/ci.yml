name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Qualidade ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # ── 2. Testes ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: maestro_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        options: --health-cmd "redis-cli ping" --health-interval 5s
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/maestro_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run test:ci

  # ── 3. Build + Push + Assinar imagem ────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write        # necessário para cosign keyless (OIDC)
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      short-sha: ${{ steps.vars.outputs.short-sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Variáveis
        id: vars
        run: echo "short-sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Instalar cosign
        uses: sigstore/cosign-installer@v3

      - name: Assinar imagem (keyless OIDC)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  # ── 4. Disparar deploy no staging ───────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging
    steps:
      - name: Chamar webhook da VPS
        env:
          IMAGE: >-
            ghcr.io/${{ github.repository }}:sha-${{ needs.build-push.outputs.short-sha }}
          SECRET: ${{ secrets.STAGING_WEBHOOK_SECRET }}
          URL: ${{ secrets.STAGING_RECEIVER_URL }}
        run: |
          PAYLOAD=$(jq -cn \
            --arg sha "${{ github.sha }}" \
            --arg image "$IMAGE" \
            --arg env "staging" \
            '{sha:$sha, image:$image, env:$env}')

          SIG="sha256=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$SECRET" -hex | \
            awk '{print $2}')"

          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "$URL/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            --max-time 15)

          [ "$HTTP" = "202" ] || { echo "Webhook falhou: HTTP $HTTP"; exit 1; }
          echo "✅ Deploy aceito (staging)"
